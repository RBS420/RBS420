<script>
const CONFIG = {
  appTitle: "Water",

  // Daily target in oz. Editable any time in Settings.
  targetOz: 99
};
</script>

<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --text-1: #ffffff;
  --text-2: rgba(255,255,255,0.6);
  --text-3: rgba(255,255,255,0.4);
  --text-4: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.14);
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --info: #7DD3FC;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #14141a 0%, #0a0a0b 60%);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.shell { max-width: 720px; margin: 0 auto; padding: 24px max(16px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }

/* ----- Top day pill + header ----- */
.day-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-2);
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.title { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-2); cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.18s, color 0.18s;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-1); }

/* ----- Eyebrow divider ----- */
.divider {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10);
}
.divider span {
  font-size: 11px; letter-spacing: 0.22em; font-weight: 600;
  color: rgba(255,255,255,0.85);
}

/* ----- Card ----- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px 20px 18px;
  margin-bottom: 14px;
}

/* ----- Water hero ----- */
.water-label {
  font-size: 10px; letter-spacing: 0.20em; font-weight: 700;
  color: var(--text-3); margin-bottom: 8px; text-transform: uppercase;
}
.water-row {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
}
.water-num {
  font-size: 56px; font-weight: 700; letter-spacing: -0.03em;
  line-height: 1; font-variant-numeric: tabular-nums;
}
.water-target {
  font-size: 18px; color: var(--text-3); font-weight: 500;
}

/* Progress bar */
.water-bar-wrap { position: relative; margin: 14px 0 22px; }
.water-bar-track {
  position: relative; height: 28px; border-radius: 14px;
  background: rgba(255,255,255,0.04);
  overflow: hidden;
}
.water-bar-fill {
  position: absolute; top: 0; bottom: 0; left: 0;
  border-radius: 14px;
  background: linear-gradient(90deg, var(--info), var(--good));
  transition: width 0.4s ease;
  box-shadow: 0 0 18px rgba(110,231,183,0.18);
}
.water-bar-fill.over {
  background: linear-gradient(90deg, var(--good), var(--warn));
}
.water-bar-zone {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: rgba(255,255,255,0.18);
}
.water-bar-labels {
  display: flex; justify-content: space-between;
  margin-top: 6px;
  font-size: 10px; color: var(--text-3);
  font-family: var(--font-mono);
}
.water-bar-labels .water-zone-name {
  color: var(--good); font-weight: 700; letter-spacing: 0.10em;
  text-transform: lowercase;
}

/* Quick add */
.quick-add-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 6px;
}
.quick-add-btn {
  flex: 1 1 30%; min-width: 64px;
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border: none; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  padding: 14px 4px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.40);
}
.quick-add-btn:hover { transform: translateY(-1px); }
.quick-add-btn:active { transform: scale(0.97); }

.custom-add-row {
  display: grid; grid-template-columns: 1fr auto; gap: 8px;
  margin-top: 10px;
}
.custom-add-input {
  width: 100%; background: rgba(0,0,0,0.28);
  border: 1px solid var(--border);
  color: var(--text-1); font-family: inherit; font-size: 16px; font-weight: 600;
  text-align: center;
  padding: 12px; border-radius: 12px; outline: none;
  -moz-appearance: textfield;
}
.custom-add-input::-webkit-outer-spin-button,
.custom-add-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.custom-add-input:focus { border-color: rgba(110,231,183,0.40); }
.custom-add-btn {
  padding: 12px 20px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.06);
  color: var(--text-1); border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.custom-add-btn:hover { background: rgba(255,255,255,0.10); }

.undo-link {
  display: block; width: 100%; text-align: center; margin-top: 12px;
  background: transparent; border: none;
  color: var(--text-3); font-size: 12px; font-family: inherit;
  cursor: pointer; padding: 6px;
  -webkit-tap-highlight-color: transparent;
}
.undo-link:hover { color: var(--text-1); }
.undo-link:disabled { opacity: 0.4; cursor: not-allowed; }

.water-helper {
  text-align: center; font-size: 12px;
  color: var(--text-3); margin-top: 8px;
  font-style: italic;
}
.water-helper.good { color: var(--good); font-style: normal; }

/* ----- History ----- */
.hist-row {
  display: grid; grid-template-columns: 70px 1fr auto; gap: 10px;
  padding: 10px 0; align-items: center;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.hist-bar-wrap {
  height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden;
}
.hist-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--info), var(--good));
  border-radius: 4px;
}
.hist-bar-fill.miss { background: rgba(255,138,138,0.4); }
.hist-count {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text-2); font-variant-numeric: tabular-nums;
}

/* ----- Mini chart for last 14 days ----- */
.spark-wrap { padding: 6px 0; }
.spark-svg { width: 100%; height: 70px; display: block; }
.spark-bar { fill: var(--good); }
.spark-bar.miss { fill: rgba(255,138,138,0.5); }
.spark-target {
  stroke: rgba(255,255,255,0.20);
  stroke-width: 1; stroke-dasharray: 3 3;
  vector-effect: non-scaling-stroke;
}

/* ----- Modal ----- */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 480px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 22px; max-height: 88vh; overflow-y: auto;
}
.modal h3 {
  margin: 0 0 14px; font-size: 17px; font-weight: 700;
}
.set-section { margin-bottom: 22px; }
.set-section h4 {
  margin: 0 0 8px; font-size: 11px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-3);
}

/* ----- Form fields ----- */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.field label {
  font-size: 11px; color: var(--text-3); font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.field input[type="number"], .field input[type="text"], .field select {
  background: rgba(0,0,0,0.28);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-family: inherit; font-size: 16px;
  padding: 10px 12px; border-radius: 10px; outline: none;
  -moz-appearance: textfield;
}
.field input[type="number"]::-webkit-outer-spin-button,
.field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.field input:focus, .field select:focus {
  border-color: rgba(110,231,183,0.40);
  box-shadow: 0 0 0 2px rgba(110,231,183,0.10);
}
/* ----- Buttons ----- */
.btn-primary {
  width: 100%; padding: 13px;
  border: none;
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.40);
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary {
  padding: 11px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-1); border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.10); }
.modal-actions {
  display: flex; gap: 8px; margin-top: 16px;
}
.modal-actions .btn-primary { flex: 1; }

@media (max-width: 480px) {
  .shell { padding: 16px 12px 60px; }
  .water-num { font-size: 48px; }
}
</style>

<body>

<div class="shell">

  <button class="day-pill" id="dayPill" type="button">
    <span id="dayPillLabel">—</span>
  </button>

  <div class="header">
    <h1 class="title" id="appTitle">Water</h1>
    <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="divider"><span>WATER</span></div>

  <div class="card">
    <div class="water-label">OZ DRANK TODAY</div>
    <div class="water-row">
      <span class="water-num" id="waterNum">0</span>
      <span class="water-target" id="waterTarget">out of 99 oz</span>
    </div>

    <div class="water-bar-wrap">
      <div class="water-bar-track">
        <div class="water-bar-fill" id="waterBarFill" style="width:0%"></div>
        <div class="water-bar-zone" id="waterBarZoneStart" style="left:55%"></div>
        <div class="water-bar-zone" id="waterBarZoneEnd"   style="left:80%"></div>
      </div>
      <div class="water-bar-labels">
        <span id="waterBarMin">0</span>

        <span id="waterBarMax">100+</span>

      <button class="custom-add-btn" id="customAddBtn" type="button">Add</button>

<!-- Settings modal -->
<div class="modal-bg" id="setModalBg">
  <div class="modal">
    <h3>Settings</h3>

    <div class="set-section">
      <h4>Daily target</h4>
      <div class="field">
        <label>Oz per day</label>
        <input type="number" id="setTargetOz" min="1" max="300" step="1">
      </div>
    </div>

    <div class="set-section">
      <h4>Data</h4>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-secondary" id="setExport">Export JSON</button>
        <button class="btn-secondary" id="setImport">Import JSON</button>
        <button class="btn-secondary" id="setReset" style="color:var(--bad);border-color:rgba(255,138,138,0.3)">Reset all</button>
      </div>
      <input type="file" id="setImportFile" accept=".json" style="display:none">
    </div>

    <div class="modal-actions">
      <button class="btn-primary" id="setClose">Done</button>
    </div>

<script>
(function() {
  const $ = (id) => document.getElementById(id);

  // ============================================================
  // STATE — water logs are stored as total oz per day (not a serving
  // count), e.g. state.logs['2026-06-19'] = 64. Daily target is just a
  // flat number you set yourself, no calculation.
  // ============================================================
  const LS_KEY = 'po_water_v1';
  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) return normalize(JSON.parse(raw));
    } catch (e) {}
    return normalize({});
  }
  function normalize(s) {
    s = s || {};
    // Older versions tracked a serving count (bottles/glasses/etc) with
    // caffeine + stimulant adjustments, plus a profile-based target
    // calculation. Those numbers don't mean anything as oz, so start
    // today's logs fresh rather than show confusing history.
    if (s.unit || s.substances || s.caffeineMgPerDay != null) {
      s.logs = {};
    }
    delete s.unit; delete s.bottleMl; delete s.glassMl;
    delete s.caffeineMgPerDay; delete s.substances;
    delete s.profile; delete s.weightUnit;
    s.targetOz = (s.targetOz != null) ? s.targetOz : (CONFIG.targetOz || 99);
    s.logs = (s.logs && typeof s.logs === 'object') ? s.logs : {};  // {YYYY-MM-DD: oz_total}
    return s;
  }
  function saveState() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }
  let state = loadState();
  $('appTitle').textContent = CONFIG.appTitle || 'Water';

  // Last amount added this session, for the undo button. Not persisted —
  // resets on reload, which is fine for an "oops" undo.
  let lastAddOz = null;

  // Helpers
  function dateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function todayKey() { return dateKey(new Date()); }
  function todayOz() { return state.logs[todayKey()] || 0; }
  function setTodayOz(n) {
    const k = todayKey();
    if (n <= 0) delete state.logs[k];
    else state.logs[k] = n;
    saveState();
  }

  // ============================================================
  // RENDER
  // ============================================================
  function renderDayPill() {
    const d = new Date();
    const dows = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const mons = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    $('dayPillLabel').textContent = dows[d.getDay()] + ', ' + mons[d.getMonth()] + ' ' + d.getDate();
  }

  function renderWater() {
    const targetOz = state.targetOz || 99;
    const count = todayOz();

    $('waterNum').textContent = count;
    $('waterTarget').textContent = 'out of ' + targetOz + ' oz';

    // Progress bar with three zones: low (0-65%), healthy (65-100%), over (100-150%)
    const pctRaw = (count / targetOz) * 100;
    const fillPct = Math.min(150, pctRaw) / 1.5;   // bar represents 0-150%
    const fill = $('waterBarFill');
    fill.style.width = fillPct + '%';
    fill.classList.toggle('over', pctRaw > 100);
    $('waterBarMin').textContent = '0';
    $('waterBarMax').textContent = (Math.ceil(targetOz * 1.5)) + '+';
    $('waterBarZoneStart').style.left = (65 / 1.5) + '%';
    $('waterBarZoneEnd').style.left   = (100 / 1.5) + '%';

    // Helper text
    const helper = $('waterHelper');
    if (count === 0) { helper.textContent = 'Start the day — first one in.'; helper.classList.remove('good'); }
    else if (pctRaw < 50) { helper.textContent = 'Behind pace — drink some in the next hour.'; helper.classList.remove('good'); }
    else if (pctRaw < 100) { helper.textContent = (targetOz - count) + ' oz to go. Pacing well.'; helper.classList.remove('good'); }
    else if (pctRaw < 130) { helper.textContent = '✓ Target hit — top up if you train this evening.'; helper.classList.add('good'); }
    else { helper.textContent = 'Strong — way past target.'; helper.classList.add('good'); }

    $('undoBtn').disabled = lastAddOz == null;

    renderHistory(targetOz);
    renderSparkline(targetOz);
  }

  function renderHistory(target) {
    const list = $('histList');
    // Last 6 days (not counting today)
    const days = [];
    for (let i = 6; i >= 1; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const k = dateKey(d);
      const n = state.logs[k] || 0;
      days.push({ date: d, key: k, count: n });
    }
    list.innerHTML = days.map(({date, count}) => {
      const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const lbl = dows[date.getDay()] + ' ' + (date.getMonth()+1) + '/' + date.getDate();
      const pct = Math.min(100, (count / target) * 100);
      const cls = (count >= target) ? '' : 'miss';
      return '<div class="hist-row">'
        + '<span class="hist-date">' + lbl + '</span>'
        + '<div class="hist-bar-wrap"><div class="hist-bar-fill ' + cls + '" style="width:' + pct + '%"></div></div>'
        + '<span class="hist-count">' + count + '/' + target + '</span>'
        + '</div>';
    }).join('') || '<div style="text-align:center;font-size:12px;color:var(--text-3);padding:12px 0">No logs yet.</div>';
  }

  function renderSparkline(target) {
    const svg = $('sparkSvg');
    const W = 280, H = 70, pad = 4;
    const days = 14;
    const data = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const k = dateKey(d);
      data.push(state.logs[k] || 0);
    }
    const maxVal = Math.max(target, Math.max.apply(null, data)) || 1;
    const colW = (W - pad * 2) / data.length;
    const barW = colW * 0.7;
    let html = '';
    const targetY = H - pad - (target / maxVal) * (H - pad * 2);
    html += '<line class="spark-target" x1="0" x2="' + W + '" y1="' + targetY.toFixed(1) + '" y2="' + targetY.toFixed(1) + '"/>';
    data.forEach((v, i) => {
      const x = pad + i * colW + (colW - barW) / 2;
      const h = (v / maxVal) * (H - pad * 2);
      const y = H - pad - h;
      const cls = (v >= target) ? 'spark-bar' : 'spark-bar miss';
      html += '<rect class="' + cls + '" x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + Math.max(0, h).toFixed(1) + '" rx="2"/>';
    });
    svg.innerHTML = html;
  }

  function renderAll() { renderDayPill(); renderWater(); }

  // ============================================================
  // EVENT WIRING
  // ============================================================
  function addOz(n) {
    if (!n || n <= 0) return;
    lastAddOz = n;
    setTodayOz(todayOz() + n);
    renderWater();
  }
  document.querySelectorAll('.quick-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      addOz(parseFloat(btn.dataset.oz));
      btn.style.transform = 'scale(0.96)';
      setTimeout(() => { btn.style.transform = ''; }, 120);
    });
  });
  $('customAddBtn').addEventListener('click', () => {
    const v = parseFloat($('customOz').value);
    if (!v || v <= 0) return;
    addOz(v);
    $('customOz').value = '';
  });
  $('customOz').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('customAddBtn').click();
  });
  $('undoBtn').addEventListener('click', () => {
    if (lastAddOz == null) return;
    setTodayOz(Math.max(0, todayOz() - lastAddOz));
    lastAddOz = null;
    renderWater();
  });

  // ============================================================
  // SETTINGS
  // ============================================================
  function renderSettings() {
    $('setTargetOz').value = state.targetOz;
  }
  $('setTargetOz').addEventListener('input', () => {
    const v = parseFloat($('setTargetOz').value);
    state.targetOz = v || 99;
    saveState(); renderWater();
  });

  $('settingsBtn').addEventListener('click', () => {
    renderSettings();
    $('setModalBg').classList.add('show');
  });
  $('setClose').addEventListener('click', () => $('setModalBg').classList.remove('show'));

  // Export / import / reset
  $('setExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'water-data-' + new Date().toISOString().slice(0,10) + '.json';
    a.click(); URL.revokeObjectURL(url);
  });
  $('setImport').addEventListener('click', () => $('setImportFile').click());
  $('setImportFile').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!confirm('Replace ALL current data with the imported file?')) return;
        state = normalize(parsed);
        saveState(); renderSettings(); renderAll();
      } catch (err) { alert('Import failed: ' + err.message); }
    };
    r.readAsText(f);
  });
  $('setReset').addEventListener('click', () => {
    if (!confirm('Wipe ALL water logs and settings? This cannot be undone.')) return;
    localStorage.removeItem(LS_KEY);
    state = loadState();
    $('setModalBg').classList.remove('show');
    renderAll();
  });

  // BOOT
  renderAll();
})();
</script>
<style>
/* === iPhone bottom-safe-area fix ===
   The Done button in the settings modal + the bottom of the page were
   getting blocked by the iPhone home indicator. These rules add
   safe-area padding so nothing sits under it. */
.shell {
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}
.modal-bg {
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  padding-top: max(20px, env(safe-area-inset-top));
}
.modal {
  max-height: calc(88vh - env(safe-area-inset-bottom));
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  try { if (window.self !== window.top) return; } catch (e) { return; }
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>
