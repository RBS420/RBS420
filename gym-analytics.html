<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout Analytics</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --text-1: #ffffff;
  --text-2: rgba(255,255,255,0.6);
  --text-3: rgba(255,255,255,0.4);
  --text-4: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.14);
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #14141a 0%, #0a0a0b 60%);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%; max-width: 100vw;
}
.po-shell {
  width: 100%; max-width: min(720px, 100vw);
  margin: 0 auto;
  padding: 24px max(16px, env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  box-sizing: border-box;
}
.po-shell *, .po-shell *::before, .po-shell *::after { min-width: 0; }
img, video, canvas, svg { max-width: 100%; }

.an-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.an-back {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-1); text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.an-back:hover { background: rgba(255,255,255,0.08); }
.an-title { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }

.an-day-seg {
  display: flex; flex-wrap: wrap;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 4px; gap: 4px;
  margin-bottom: 18px;
}
.an-day-seg-btn {
  flex: 1 1 auto; min-width: 64px;
  padding: 10px 8px; border: none; background: transparent;
  color: var(--text-3); border-radius: 8px;
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.an-day-seg-btn:hover { color: var(--text-2); background: rgba(255,255,255,0.04); }
.an-day-seg-btn.active {
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 4px 12px rgba(0,0,0,0.35);
}

.an-day-group { margin-bottom: 22px; }
.an-day-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-3);
  margin-bottom: 10px;
}
.an-day-title::before {
  content: ''; width: 24px; height: 1px; background: var(--border-strong);
}
.an-empty {
  padding: 24px 0; text-align: center; font-size: 13px; color: var(--text-3); font-style: italic;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  margin-bottom: 10px;
  overflow: hidden;
}
.card.needs-increase {
  background: rgba(110,231,183,0.06);
  border-color: rgba(110,231,183,0.30);
}
.an-ex-header {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 16px 18px;
  background: transparent; border: none; cursor: pointer;
  font-family: inherit; text-align: left; color: var(--text-1);
  -webkit-tap-highlight-color: transparent;
}
.an-ex-name { font-size: 14px; font-weight: 700; flex: 1; min-width: 0; }
.po-ex-badge {
  display: inline-block; margin-left: 6px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(110,231,183,0.14); color: var(--good);
  vertical-align: middle;
}
.an-ex-meta { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.an-ex-chevron { font-size: 13px; color: var(--text-3); transition: transform 0.2s; flex-shrink: 0; }
.an-ex-card.is-open .an-ex-chevron { transform: rotate(180deg); }
.an-ex-body {
  padding: 0 18px 18px;
  display: flex; flex-direction: column; gap: 18px;
}
.an-ex-body.hidden { display: none; }

.po-sub-title-an {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
}


.po-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.po-stat-box {
  padding: 14px 12px;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 12px; text-align: center;
}
.po-stat-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
}
.po-stat-val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
.po-unit { font-size: 11px; color: var(--text-3); font-weight: 500; margin-left: 2px; }

.an-chart-wrap canvas { display: block; width: 100%; height: 180px; }

.po-empty { padding: 14px 0; text-align: center; font-size: 12px; color: var(--text-3); font-style: italic; }
.po-hist-row {
  display: grid; grid-template-columns: 60px 1fr; gap: 12px;
  padding: 8px 4px; align-items: center;
  border-bottom: 1px solid var(--border);
}
.po-hist-row:last-child { border-bottom: none; }
.po-hist-date { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.po-hist-set { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }

.hidden { display: none !important; }

::selection { background: rgba(255,255,255,0.18); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="po-shell">
  <div class="an-header">
    <a class="an-back" href="gym.html" aria-label="Back to workout">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>
    <h1 class="an-title">Analytics</h1>
  </div>

  <div class="an-day-seg" id="anDaySeg"></div>

  <div id="anContent"></div>
</div>

<script>
(() => {
'use strict';

const LS_KEY = 'po_coach_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
const state = loadState();
const days = Array.isArray(state.days) ? state.days : [];
const exercises = Array.isArray(state.exercises) ? state.exercises : [];
const logsByEx = (state.logs && typeof state.logs === 'object') ? state.logs : {};
const units = state.units || 'kg';

function unit() { return units; }
function getLogsFor(exId) { return (logsByEx[exId] || []).slice(); }
function estimate1RM(w, r) { if (r < 2) return w; return w * (1 + r / 30); }
function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Mirrors needsWeightIncrease() in gym.html — keep the two in sync if
// you change the rep ceiling.
const HARD_REP_CEILING = 15;
function needsWeightIncrease(logs) {
  if (!logs.length) return false;
  return (logs[logs.length - 1].reps || 0) >= HARD_REP_CEILING;
}

function renderStats(ex, logs) {
  if (!logs.length) {
    return '<div class="po-stats-row">'
      + '<div class="po-stat-box"><div class="po-stat-label">Est. 1RM</div><div class="po-stat-val">—</div></div>'
      + '<div class="po-stat-box"><div class="po-stat-label">Best set</div><div class="po-stat-val">—</div></div>'
      + '<div class="po-stat-box"><div class="po-stat-label">Sessions</div><div class="po-stat-val">—</div></div>'
      + '</div>';
  }
  const orm = Math.max.apply(null, logs.map(l => estimate1RM(l.weight, l.reps)));
  const oneRmHtml = Math.round(orm) + '<span class="po-unit">' + unit() + '</span>';
  let best = logs[0];
  logs.forEach(l => {
    if (estimate1RM(l.weight, l.reps) > estimate1RM(best.weight, best.reps)) best = l;
  });
  const bestStr = best.weight + '×' + best.reps;
  return '<div class="po-stats-row">'
    + '<div class="po-stat-box"><div class="po-stat-label">Est. 1RM</div><div class="po-stat-val">' + oneRmHtml + '</div></div>'
    + '<div class="po-stat-box"><div class="po-stat-label">Best set</div><div class="po-stat-val">' + bestStr + '</div></div>'
    + '<div class="po-stat-box"><div class="po-stat-label">Sessions</div><div class="po-stat-val">' + logs.length + '</div></div>'
    + '</div>';
}

function renderHistory(ex, logs) {
  if (!logs.length) return '<div class="po-empty">No logs yet.</div>';
  const rev = logs.slice().reverse();
  return rev.slice(0, 30).map(l => {
    const d = new Date(l.date);
    const dStr = (d.getMonth() + 1) + '/' + d.getDate();
    const setStr = l.weight + unit() + ' × ' + l.reps;
    return '<div class="po-hist-row"><div class="po-hist-date">' + dStr + '</div><div class="po-hist-set">' + setStr + '</div></div>';
  }).join('');
}

function drawChart(canvas, ex, logs) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth || 300;
  const H = 180;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (!logs.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('No logs yet', W / 2, H / 2);
    return;
  }

  const PL = 46, PR = 14, PT = 12, PB = 24;
  const cW = W - PL - PR, cH = H - PT - PB;
  const vals = logs.map(l => l.weight);
  let yRange = Math.max(...vals) - Math.min(...vals);
  if (yRange < 1) yRange = 1;
  const pad = yRange * 0.18 + 0.5;
  const yMin = Math.min(...vals) - pad, yMax = Math.max(...vals) + pad, ySpan = yMax - yMin;
  const tStart = new Date(logs[0].date).getTime();
  const tEnd = new Date(logs[logs.length - 1].date).getTime();
  const tSpan = Math.max(1, tEnd - tStart);

  const yPx = v => PT + cH - ((v - yMin) / ySpan) * cH;
  const xPx = (t) => logs.length === 1 ? PL + cW / 2 : PL + ((t - tStart) / tSpan) * cW;

  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = PT + (cH / 3) * i;
    ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(PL + cW, y); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.font = '10px ui-monospace, "SF Mono", Menlo, monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let i = 0; i <= 3; i++) {
    ctx.fillText((yMin + (ySpan / 3) * (3 - i)).toFixed(1), PL - 6, PT + (cH / 3) * i);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = '9px ui-monospace, "SF Mono", Menlo, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  const xCount = Math.min(5, logs.length - 1);
  for (let i = 0; i <= xCount; i++) {
    const t = tStart + (tSpan / Math.max(xCount, 1)) * i;
    const d = new Date(t);
    ctx.fillText((d.getMonth() + 1) + '/' + d.getDate(), PL + (cW / Math.max(xCount, 1)) * i, PT + cH + 17);
  }

  if (logs.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    logs.forEach((l, i) => {
      const t = new Date(l.date).getTime();
      const x = xPx(t), y = yPx(l.weight);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  }
  logs.forEach(l => {
    const t = new Date(l.date).getTime();
    const x = xPx(t), y = yPx(l.weight);
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#FFFFFF'; ctx.fill();
  });
}

function renderExerciseCard(ex) {
  const logs = getLogsFor(ex.id);
  const flagged = needsWeightIncrease(logs);
  const flagBadge = flagged ? '<span class="po-ex-badge">↑ Add weight</span>' : '';
  return '<div class="card an-ex-card' + (flagged ? ' needs-increase' : '') + '" data-ex-id="' + ex.id + '">'
    + '<button type="button" class="an-ex-header" data-action="toggle">'
    +   '<span class="an-ex-name">' + escape(ex.name) + flagBadge + '</span>'
    +   '<span class="an-ex-meta">' + logs.length + ' session' + (logs.length === 1 ? '' : 's') + '</span>'
    +   '<span class="an-ex-chevron">▾</span>'
    + '</button>'
    + '<div class="an-ex-body hidden">'
    +   '<div>'
    +     '<div class="po-sub-title-an">Stats</div>'
    +     renderStats(ex, logs)
    +   '</div>'
    +   '<div class="an-chart-wrap">'
    +     '<div class="po-sub-title-an">Weight over time (full history)</div>'
    +     '<canvas></canvas>'
    +   '</div>'
    +   '<div>'
    +     '<div class="po-sub-title-an">History</div>'
    +     renderHistory(ex, logs)
    +   '</div>'
    + '</div>'
    + '</div>';
}

// Same today-split calculation as gym.html's todaySplit(), so Analytics
// opens on whichever day you'd actually be training today.
function todaySplitName() {
  try {
    const rot = state.splitRotation;
    if (!rot || !rot.length) return null;
    const a = new Date(state.splitAnchor.date);
    const t = new Date();
    a.setHours(0,0,0,0); t.setHours(0,0,0,0);
    const diffDays = Math.round((t - a) / 86400000);
    const idx = ((state.splitAnchor.index + diffDays) % rot.length + rot.length) % rot.length;
    return rot[idx];
  } catch (e) { return null; }
}
function isRestName(name) { return /^rest\b/i.test(name || ''); }

let activeDay = (() => {
  const name = todaySplitName();
  if (name && !isRestName(name)) {
    const match = days.find(d => d.name.toLowerCase() === name.toLowerCase());
    if (match) return match.id;
  }
  return days.length ? days[0].id : null;
})();

function renderDaySeg() {
  const seg = document.getElementById('anDaySeg');
  if (days.length < 2) { seg.classList.add('hidden'); return; }
  seg.innerHTML = days.map(d =>
    '<button type="button" class="an-day-seg-btn' + (d.id === activeDay ? ' active' : '') + '" data-day="' + d.id + '">' + escape(d.name) + '</button>'
  ).join('');
  seg.querySelectorAll('.an-day-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeDay = btn.dataset.day;
      seg.querySelectorAll('.an-day-seg-btn').forEach(b => b.classList.toggle('active', b.dataset.day === activeDay));
      renderAll();
    });
  });
}

function renderAll() {
  const container = document.getElementById('anContent');
  if (!days.length || !exercises.length) {
    container.innerHTML = '<div class="an-empty">No workout data yet — log a few sets on the Fitness tab first.</div>';
    return;
  }
  const day = days.find(d => d.id === activeDay);
  const dayExercises = exercises.filter(ex =>
    Array.isArray(ex.days) ? ex.days.includes(activeDay) : ex.day === activeDay);
  const groups = dayExercises.length
    ? '<div class="an-day-group">'
      + '<div class="an-day-title">' + escape(day ? day.name : '') + '</div>'
      + dayExercises.map(renderExerciseCard).join('')
      + '</div>'
    : '';
  container.innerHTML = groups || '<div class="an-empty">No exercises for this day yet.</div>';

  container.querySelectorAll('.an-ex-card').forEach(card => {
    const header = card.querySelector('.an-ex-header');
    const body = card.querySelector('.an-ex-body');
    header.addEventListener('click', () => {
      const isOpen = card.classList.contains('is-open');
      if (isOpen) {
        card.classList.remove('is-open');
        body.classList.add('hidden');
        return;
      }
      card.classList.add('is-open');
      body.classList.remove('hidden');
      const exId = card.dataset.exId;
      const ex = exercises.find(x => x.id === exId);
      const logs = getLogsFor(exId);
      drawChart(card.querySelector('canvas'), ex, logs);
    });
  });
}

renderDaySeg();
renderAll();
window.addEventListener('resize', () => {
  document.querySelectorAll('.an-ex-card.is-open').forEach(card => {
    const exId = card.dataset.exId;
    const ex = exercises.find(x => x.id === exId);
    drawChart(card.querySelector('canvas'), ex, getLogsFor(exId));
  });
});
})();
</script>
</body>
</html>
