<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health — Weight</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255,255,255,0.04);
  --bg-secondary: rgba(255,255,255,0.035);
  --bg-input: rgba(0,0,0,0.28);
  --bg-input-focus: rgba(0,0,0,0.36);
  --border: rgba(255,255,255,0.06);
  --border-soft: rgba(255,255,255,0.04);
  --border-strong: rgba(255,255,255,0.12);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224,118,88,0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180,180,200,0.06) 0%, transparent 60%);
  filter: blur(40px); pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-2%,2%); } }
main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: max(56px, env(safe-area-inset-top,56px)) max(20px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 24px 4px 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-title:first-child { margin-top: 0; }
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }
.wt-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 22px 22px 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  margin-bottom: 0;
}

/* LOG FORM */
.log-input-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.log-kg-wrap { position: relative; flex: 1; }
.log-kg-input {
  width: 100%; font-size: 32px; font-weight: 700;
  padding: 14px 54px 14px 18px;
  border-radius: 12px; border: 1px solid var(--border-strong);
  background: var(--bg-input); color: var(--text-primary);
  font-family: inherit; text-align: center; letter-spacing: -0.02em;
  transition: border-color 0.18s, background 0.18s;
  -moz-appearance: textfield; appearance: textfield;
}
.log-kg-input::-webkit-outer-spin-button,
.log-kg-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.log-kg-input::placeholder { color: var(--text-quaternary); }
.log-kg-input:focus { outline: none; border-color: rgba(255,255,255,0.35); background: var(--bg-input-focus); }
.log-kg-unit {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; font-weight: 600; color: var(--text-tertiary); pointer-events: none;
}
.log-lbs-display { font-size: 13px; color: var(--text-tertiary); white-space: nowrap; min-width: 72px; text-align: right; font-variant-numeric: tabular-nums; }
.log-bottom-row { display: flex; align-items: center; gap: 10px; }
.log-date-input {
  flex: 1; font-size: 16px; padding: 10px 14px;
  border-radius: 10px; border: 1px solid var(--border-strong);
  background: var(--bg-input); color: var(--text-primary);
  font-family: inherit; transition: border-color 0.18s, background 0.18s;
}
.log-date-input:focus { outline: none; border-color: rgba(255,255,255,0.35); background: var(--bg-input-focus); }
.log-btn {
  font-size: 14px; font-weight: 700; padding: 10px 22px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg,#FFF 0%,#E8E5DD 100%);
  color: #0A0A0B; cursor: pointer; font-family: inherit;
  transition: transform 0.12s, box-shadow 0.18s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.30);
  white-space: nowrap;
}
.log-btn:hover { transform: translateY(-1px); }
.log-btn:active { transform: translateY(0) scale(0.97); }

/* STATS STRIP */
.stats-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 12px 0; }
.stat-box {
  background: var(--bg-card); border-radius: 14px; padding: 16px 14px 14px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.stat-label {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px;
}
.stat-value { font-size: 17px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; font-variant-numeric: tabular-nums; }

/* CHART */
.chart-header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 14px; }
.win-btns { display: flex; gap: 4px; }
.win-btn {
  font-size: 11px; font-weight: 600; font-family: var(--font-mono);
  padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border-strong);
  background: transparent; color: var(--text-tertiary); cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.04em;
}
.win-btn:hover { color: var(--text-secondary); border-color: rgba(255,255,255,0.2); }
.win-btn.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); color: var(--text-primary); }
.chart-wrap { width: 100%; }
.chart-wrap canvas { display: block; width: 100%; height: 200px; }
.chart-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-soft);
  font-size: 12px; color: var(--text-tertiary); flex-wrap: wrap;
}
.chart-footer-status { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }

/* GOAL CARD */
.goal-input-row { display: flex; align-items: center; gap: 10px; }
.goal-kg-input {
  flex: 1; font-size: 16px; font-weight: 600; padding: 10px 14px;
  border-radius: 10px; border: 1px solid var(--border-strong);
  background: var(--bg-input); color: var(--text-primary);
  font-family: inherit; transition: border-color 0.18s, background 0.18s;
  -moz-appearance: textfield; appearance: textfield;
}
.goal-kg-input::-webkit-outer-spin-button,
.goal-kg-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.goal-kg-input::placeholder { color: var(--text-quaternary); }
.goal-kg-input:focus { outline: none; border-color: rgba(255,255,255,0.35); background: var(--bg-input-focus); }
.goal-lbs-display { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; font-variant-numeric: tabular-nums; }
.goal-set-btn {
  font-size: 13px; font-weight: 700; padding: 10px 18px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg,#FFF 0%,#E8E5DD 100%);
  color: #0A0A0B; cursor: pointer; font-family: inherit;
  transition: transform 0.12s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.30);
  white-space: nowrap;
}
.goal-set-btn:hover { transform: translateY(-1px); }
.goal-set-btn:active { transform: translateY(0) scale(0.97); }
.goal-meta { margin-top: 12px; font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.goal-clear-btn {
  background: transparent; border: none; color: var(--text-quaternary);
  cursor: pointer; font-size: 11px; font-family: inherit;
  padding: 0; text-decoration: underline; transition: color 0.15s;
}
.goal-clear-btn:hover { color: var(--text-tertiary); }

/* HISTORY */
.history-empty { font-size: 13px; color: var(--text-quaternary); font-style: italic; text-align: center; padding: 12px 0; }
.history-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid var(--border-soft);
}
.history-item:last-child { border-bottom: none; }
.history-date { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); min-width: 90px; }
.history-kg { font-size: 15px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.history-lbs { font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
.history-del {
  margin-left: auto; background: transparent; border: none;
  color: var(--text-quaternary); cursor: pointer;
  font-size: 18px; line-height: 1; padding: 2px 8px; border-radius: 6px;
  transition: color 0.15s, background 0.15s; font-family: inherit;
}
.history-del:hover { color: #FF6B6B; background: rgba(239,68,68,0.08); }

@media (max-width: 480px) {
  .stat-value { font-size: 15px; }
  .log-kg-input { font-size: 26px; }
  .stats-strip { gap: 8px; }
}
::selection { background: rgba(224,118,88,0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<main>

  <div class="section-title">Log Weight</div>
  <div class="wt-card">
    <div class="log-input-row">
      <div class="log-kg-wrap">
        <input id="logKgInput" type="number" step="0.1" min="20" max="300"
               placeholder="0.0" class="log-kg-input" inputmode="decimal" />
        <span class="log-kg-unit">kg</span>
      </div>
      <div class="log-lbs-display" id="logLbsDisplay">— lbs</div>
    </div>
    <div class="log-bottom-row">
      <input id="logDateInput" type="date" class="log-date-input" />
      <button id="logBtn" class="log-btn">Log</button>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stat-box">
      <div class="stat-label">Current</div>
      <div class="stat-value" id="statCurrent">—</div>
      <div class="stat-sub" id="statCurrentSub">no entries</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Weekly</div>
      <div class="stat-value" id="statWeekly">—</div>
      <div class="stat-sub" id="statWeeklySub">avg change</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Goal</div>
      <div class="stat-value" id="statGoal">—</div>
      <div class="stat-sub" id="statGoalSub">not set</div>
    </div>
  </div>

  <div class="section-title">Trend</div>
  <div class="wt-card">
    <div class="chart-header">
      <div class="win-btns">
        <button class="win-btn active" data-days="30">30d</button>
        <button class="win-btn" data-days="60">60d</button>
        <button class="win-btn" data-days="90">90d</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="weightChart"></canvas>
    </div>
    <div class="chart-footer">
      <span id="projText">Set a goal to see projection</span>
      <span class="chart-footer-status" id="statusText"></span>
    </div>
  </div>

  <div class="section-title">Goal Weight</div>
  <div class="wt-card">
    <div class="goal-input-row">
      <input id="goalKgInput" type="number" step="0.1" min="20" max="300"
             placeholder="0.0 kg" class="goal-kg-input" inputmode="decimal" />
      <span class="goal-lbs-display" id="goalLbsDisplay">— lbs</span>
      <button id="goalSetBtn" class="goal-set-btn">Set Goal</button>
    </div>
    <div class="goal-meta" id="goalMeta"></div>
  </div>

  <div class="section-title">History</div>
  <div class="wt-card">
    <div id="historyList"><div class="history-empty">No entries yet.</div></div>
  </div>

</main>
<script>
(() => {
'use strict';

const KG_TO_LBS = 2.20462;
const storeGet = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
const storeSet = (k, v) => localStorage.setItem(k, JSON.stringify(v));

function getLog() { return storeGet('weight:log') || []; }
function setLog(arr) { storeSet('weight:log', arr); }
function getGoal() { const g = storeGet('weight:goal'); return typeof g === 'number' ? g : null; }
function setGoalKg(kg) { storeSet('weight:goal', kg); }
function clearGoal() { localStorage.removeItem('weight:goal'); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtLbs(kg) { return (kg * KG_TO_LBS).toFixed(1) + ' lbs'; }

function addEntry(kg, dateStr) {
  const log = getLog();
  const idx = log.findIndex(e => e.date === dateStr);
  if (idx >= 0) { log[idx].kg = kg; }
  else { log.push({ date: dateStr, kg }); log.sort((a, b) => a.date.localeCompare(b.date)); }
  setLog(log);
}
function deleteEntry(dateStr) {
  setLog(getLog().filter(e => e.date !== dateStr));
}

// ——— Log form ———
const logKgInput = document.getElementById('logKgInput');
const logLbsDisplay = document.getElementById('logLbsDisplay');
const logDateInput = document.getElementById('logDateInput');
const logBtn = document.getElementById('logBtn');

logDateInput.value = todayStr();

logKgInput.addEventListener('input', () => {
  const kg = parseFloat(logKgInput.value);
  logLbsDisplay.textContent = isNaN(kg) ? '— lbs' : fmtLbs(kg);
});
logKgInput.addEventListener('keydown', e => { if (e.key === 'Enter') logBtn.click(); });
logBtn.addEventListener('click', () => {
  const kg = parseFloat(logKgInput.value);
  if (isNaN(kg) || kg < 20 || kg > 300) return;
  addEntry(kg, logDateInput.value || todayStr());
  logKgInput.value = '';
  logLbsDisplay.textContent = '— lbs';
  renderAll();
});

// ——— Goal form ———
const goalKgInput = document.getElementById('goalKgInput');
const goalLbsDisplay = document.getElementById('goalLbsDisplay');
const goalSetBtn = document.getElementById('goalSetBtn');
const goalMeta = document.getElementById('goalMeta');

goalKgInput.addEventListener('input', () => {
  const kg = parseFloat(goalKgInput.value);
  goalLbsDisplay.textContent = isNaN(kg) ? '— lbs' : fmtLbs(kg);
});
goalKgInput.addEventListener('keydown', e => { if (e.key === 'Enter') goalSetBtn.click(); });
goalSetBtn.addEventListener('click', () => {
  const kg = parseFloat(goalKgInput.value);
  if (isNaN(kg) || kg < 20 || kg > 300) return;
  setGoalKg(kg);
  renderAll();
});
goalMeta.addEventListener('click', e => {
  if (e.target.classList.contains('goal-clear-btn')) {
    clearGoal();
    goalKgInput.value = '';
    goalLbsDisplay.textContent = '— lbs';
    renderAll();
  }
});

function initGoalInput() {
  const goal = getGoal();
  if (goal !== null) { goalKgInput.value = goal.toFixed(1); goalLbsDisplay.textContent = fmtLbs(goal); }
}

// ——— Window toggle ———
let activeWindow = 30;
document.querySelectorAll('.win-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.win-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeWindow = parseInt(btn.dataset.days);
    drawChart();
    renderStats();
  });
});

// ——— Stats ———
function computeStats() {
  const log = getLog();
  const goal = getGoal();
  const current = log.length > 0 ? log[log.length - 1].kg : null;

  const now = new Date();
  const wStart = new Date(now);
  wStart.setDate(wStart.getDate() - activeWindow);
  const windowData = log.filter(e => new Date(e.date + 'T12:00:00') >= wStart);

  let weeklyChange = null;
  if (windowData.length >= 2) {
    const first = windowData[0], last = windowData[windowData.length - 1];
    const days = (new Date(last.date + 'T12:00:00') - new Date(first.date + 'T12:00:00')) / 86400000;
    if (days > 0) weeklyChange = ((last.kg - first.kg) / days) * 7;
  }

  let projectedDate = null;
  if (goal !== null && current !== null && weeklyChange !== null && Math.abs(weeklyChange) > 0.001) {
    const weeks = (goal - current) / weeklyChange;
    if (weeks > 0 && weeks < 520) {
      const proj = new Date();
      proj.setDate(proj.getDate() + Math.round(weeks * 7));
      projectedDate = proj;
    }
  }

  let direction = null;
  if (goal !== null && current !== null) {
    const diff = goal - current;
    if (Math.abs(diff) < 0.3) direction = 'At goal';
    else direction = diff > 0 ? 'Bulking' : 'Cutting';
  }

  let onTrack = null;
  if (weeklyChange !== null && goal !== null && current !== null) {
    onTrack = (goal > current && weeklyChange > 0) || (goal < current && weeklyChange < 0);
  }

  return { current, weeklyChange, projectedDate, direction, onTrack, goal };
}

function renderStats() {
  const { current, weeklyChange, projectedDate, direction, onTrack, goal } = computeStats();

  const statCurrent = document.getElementById('statCurrent');
  const statCurrentSub = document.getElementById('statCurrentSub');
  if (current !== null) {
    statCurrent.textContent = current.toFixed(1) + ' kg';
    statCurrentSub.textContent = fmtLbs(current);
  } else {
    statCurrent.textContent = '—';
    statCurrentSub.textContent = 'no entries';
  }

  const statWeekly = document.getElementById('statWeekly');
  const statWeeklySub = document.getElementById('statWeeklySub');
  if (weeklyChange !== null) {
    statWeekly.textContent = (weeklyChange >= 0 ? '+' : '') + weeklyChange.toFixed(2) + ' kg';
    statWeeklySub.textContent = 'per week';
  } else {
    statWeekly.textContent = '—';
    statWeeklySub.textContent = 'need 2+ entries';
  }

  const statGoalEl = document.getElementById('statGoal');
  const statGoalSub = document.getElementById('statGoalSub');
  if (goal !== null) {
    statGoalEl.textContent = goal.toFixed(1) + ' kg';
    statGoalSub.textContent = direction || '—';
  } else {
    statGoalEl.textContent = '—';
    statGoalSub.textContent = 'not set';
  }

  // Goal card meta
  if (goal !== null && current !== null) {
    const diff = Math.abs(goal - current).toFixed(1);
    const label = direction === 'Cutting' ? `${diff} kg to lose` : direction === 'Bulking' ? `${diff} kg to gain` : 'You are at goal weight';
    goalMeta.innerHTML = `<span>${direction} · ${label}</span><button class="goal-clear-btn">clear</button>`;
  } else if (goal !== null) {
    goalMeta.innerHTML = `<span>${goal.toFixed(1)} kg set</span><button class="goal-clear-btn">clear</button>`;
  } else {
    goalMeta.innerHTML = '';
  }

  // Chart footer
  const projEl = document.getElementById('projText');
  const statusEl = document.getElementById('statusText');
  if (projectedDate) {
    projEl.textContent = 'Goal by ' + projectedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    statusEl.textContent = 'On track';
  } else if (onTrack === false) {
    projEl.textContent = 'Trend moving away from goal';
    statusEl.textContent = 'Off track';
  } else if (goal !== null && weeklyChange === null) {
    projEl.textContent = 'Log more entries to see a projection';
    statusEl.textContent = '';
  } else {
    projEl.textContent = 'Set a goal to see projection';
    statusEl.textContent = '';
  }
}

// ——— History ———
function renderHistory() {
  const log = getLog();
  const histEl = document.getElementById('historyList');
  if (log.length === 0) {
    histEl.innerHTML = '<div class="history-empty">No entries yet.</div>';
    return;
  }
  histEl.innerHTML = [...log].reverse().map(e => `
    <div class="history-item">
      <span class="history-date">${fmtDate(e.date)}</span>
      <span class="history-kg">${e.kg.toFixed(1)} kg</span>
      <span class="history-lbs">${fmtLbs(e.kg)}</span>
      <button class="history-del" data-date="${e.date}" aria-label="Delete">×</button>
    </div>`).join('');
  histEl.querySelectorAll('.history-del').forEach(btn => {
    btn.addEventListener('click', () => { deleteEntry(btn.dataset.date); renderAll(); });
  });
}

// ——— Chart ———
function drawChart() {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth || 320;
  const H = 200;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const PL = 46, PR = 16, PT = 10, PB = 26;
  const cW = W - PL - PR, cH = H - PT - PB;

  const now = new Date(); now.setHours(23, 59, 59, 999);
  const wStart = new Date(now); wStart.setDate(wStart.getDate() - activeWindow); wStart.setHours(0, 0, 0, 0);

  const allLog = getLog();
  const goal = getGoal();
  const wData = allLog.filter(e => { const d = new Date(e.date + 'T12:00:00'); return d >= wStart && d <= now; });

  const vals = wData.map(e => e.kg);
  if (goal !== null) vals.push(goal);

  if (vals.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '13px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Log your first weight to see the chart', W / 2, H / 2);
    return;
  }

  let yRange = Math.max(...vals) - Math.min(...vals);
  if (yRange < 1) yRange = 1;
  const pad = yRange * 0.2 + 0.5;
  const yMin = Math.min(...vals) - pad, yMax = Math.max(...vals) + pad, ySpan = yMax - yMin;
  const tS = wStart.getTime(), tE = now.getTime(), tSpan = tE - tS;

  const yPx = v => PT + cH - ((v - yMin) / ySpan) * cH;
  const xPx = ds => PL + ((new Date(ds + 'T12:00:00').getTime() - tS) / tSpan) * cW;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.035)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PT + (cH / 4) * i;
    ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(PL + cW, y); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '10px ui-monospace,"SF Mono",Menlo,monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    ctx.fillText((yMin + (ySpan / 4) * (4 - i)).toFixed(1), PL - 5, PT + (cH / 4) * i);
  }

  // X labels
  const xCount = activeWindow <= 30 ? 4 : activeWindow <= 60 ? 5 : 6;
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = '9px ui-monospace,"SF Mono",Menlo,monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  for (let i = 0; i <= xCount; i++) {
    const t = tS + (tSpan / xCount) * i;
    const d = new Date(t);
    ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, PL + ((t - tS) / tSpan) * cW, PT + cH + 18);
  }

  // Goal line
  if (goal !== null) {
    const gy = yPx(goal);
    ctx.save(); ctx.setLineDash([3, 5]);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(PL, gy); ctx.lineTo(PL + cW, gy); ctx.stroke();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.font = '9px ui-monospace,"SF Mono",Menlo,monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('goal ' + goal.toFixed(1), PL + cW, gy - 4);
  }

  if (wData.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '12px system-ui,-apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('No entries in this period', PL + cW / 2, PT + cH / 2);
    return;
  }

  // Line
  if (wData.length > 1) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    wData.forEach((e, i) => { const x = xPx(e.date), y = yPx(e.kg); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.stroke(); ctx.restore();
  }

  // Dots
  wData.forEach(e => {
    const x = xPx(e.date), y = yPx(e.kg);
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#FFFFFF'; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
  });
}

function renderAll() { renderStats(); renderHistory(); drawChart(); }

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(drawChart, 100); });
window.addEventListener('storage', renderAll);

initGoalInput();
renderAll();
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['weight:log', 'weight:goal'],
    syncedPrefixes: [],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>
</body>
</html>
